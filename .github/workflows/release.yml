name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load build env
        run: |
          if [ -f chess-api/.env.build ]; then
            set -a; source chess-api/.env.build; set +a
          fi

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/chess-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: chess-api
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image tarball
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${VERSION:-latest}"
          docker save "${{ env.REGISTRY }}/${{ github.repository_owner }}/chess-api:$TAG" | gzip > chess-api-docker.tar.gz
          ls -lh chess-api-docker.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: chess-api-docker
          path: chess-api-docker.tar.gz
          retention-days: 1

  upload-docker:
    name: Upload Docker image to release
    runs-on: ubuntu-latest
    needs: [docker, create-release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chess-api-docker

      - uses: softprops/action-gh-release@v2
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: chess-api-docker.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            git log --oneline "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" --format='- %s'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          update: true

  package:
    name: Package (${{ matrix.os }})
    needs: [create-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            builder-args: --linux
          - os: macos
            runner: macos-latest
            builder-args: --mac
          - os: windows
            runner: windows-latest
            builder-args: --win

    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Load build env
        shell: bash
        run: |
          if [ -f .env.build ]; then
            set -a; source .env.build; set +a
          fi
          echo "APP_VERSION=${APP_VERSION:-1.0.0}" >> "$GITHUB_ENV"
          echo "SERVER_URL=${SERVER_URL:-http://localhost:25566}" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build
        env:
          SERVER_URL: ${{ env.SERVER_URL }}

      - run: npx electron-builder ${{ matrix.builder-args }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: |
            chess-client/release/*.AppImage
            chess-client/release/*.deb
            chess-client/release/*.dmg
            chess-client/release/*.exe
            chess-client/release/*.zip
          fail_on_unmatched_files: false
