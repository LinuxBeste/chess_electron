name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chess-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: chess-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            git log --oneline "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" --format='- %s'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  package-linux:
    name: Package Linux (AppImage + deb)
    runs-on: ubuntu-latest
    needs: [release]

    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npx electron-builder --linux --publish=never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: chess-client/release/*
          fail_on_unmatched_files: false

  package-macos:
    name: Package macOS (dmg)
    runs-on: macos-latest
    needs: [release]

    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npx electron-builder --mac --publish=never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: chess-client/release/*
          fail_on_unmatched_files: false

  package-windows:
    name: Package Windows (NSIS installer)
    runs-on: windows-latest
    needs: [release]

    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npx electron-builder --win --publish=never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: chess-client/release/*
          fail_on_unmatched_files: false
