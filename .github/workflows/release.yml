name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load build env
        run: |
          if [ -f chess-api/.env.build ]; then
            set -a; source chess-api/.env.build; set +a
          fi

      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/chess-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: chess-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image tarball
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${VERSION:-latest}"
          OWNER="${{ steps.owner.outputs.owner }}"
          docker pull "${{ env.REGISTRY }}/${OWNER}/chess-api:$TAG"
          docker save "${{ env.REGISTRY }}/${OWNER}/chess-api:$TAG" | gzip > "chess-api-${TAG}.tar.gz"
          ls -lh "chess-api-${TAG}.tar.gz"

      - name: Generate SHA256 checksums
        run: |
          sha256sum chess-api-*.tar.gz > chess-api-sha256.txt
          cat chess-api-sha256.txt

      - uses: actions/upload-artifact@v4
        with:
          name: chess-api-docker
          path: |
            chess-api-*.tar.gz
            chess-api-sha256.txt
          retention-days: 1

  upload-docker:
    name: Upload Docker image to release
    runs-on: ubuntu-latest
    needs: [docker, create-release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chess-api-docker

      - uses: actions/upload-artifact@v4
        with:
          name: checksum-docker
          path: chess-api-sha256.txt
          retention-days: 1

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: chess-api-*.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            git log --oneline "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" --format='- %s'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          update: true

  package:
    name: Package (${{ matrix.os }})
    needs: [create-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            builder-args: --linux
          - os: macos
            runner: macos-latest
            builder-args: --mac
          - os: windows
            runner: windows-2022
            builder-args: --win

    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Load build env
        shell: bash
        run: |
          if [ -f .env.build ]; then
            set -a; source .env.build; set +a
          fi
          echo "APP_VERSION=${APP_VERSION:-1.0.0}" >> "$GITHUB_ENV"
          echo "SERVER_URL=${SERVER_URL:-http://localhost:25566}" >> "$GITHUB_ENV"

      - name: Set version from release tag
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Applying version $VERSION to package.json"
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json && mv package.tmp.json package.json
          cat package.json | grep '"version"'

      - name: Set code signing env vars
        shell: bash
        if: matrix.os == 'windows'
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WIN_CSC_LINK" ]; then
            echo "CSC_LINK=$WIN_CSC_LINK" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "Using WIN_CSC_LINK from secrets"
          fi

      - name: Generate self-signed cert fallback
        if: matrix.os == 'windows'
        shell: bash
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            echo "WIN_CSC_LINK not set, generating self-signed code signing cert"
            bash scripts/gen-cert.sh
            PFX="${GITHUB_WORKSPACE}/chess-client/.certs/code-signing.pfx"
            echo "CSC_LINK=$PFX" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=chess-client-selfsigned" >> "$GITHUB_ENV"
          fi

      - run: pnpm install --frozen-lockfile

      - name: Create .env for build
        shell: bash
        run: |
          echo "CHESS_SERVER_URL=${SERVER_URL:-http://localhost:3000}" > .env

      - run: pnpm run build

      - run: npx electron-builder ${{ matrix.builder-args }} --publish=never

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          found=0
          for f in *.AppImage *.deb *.dmg *.exe *.zip; do
            if [ -f "$f" ]; then
              if command -v sha256sum &>/dev/null; then
                sha256sum "$f"
              elif command -v shasum &>/dev/null; then
                shasum -a 256 "$f"
              else
                openssl dgst -sha256 "$f" | sed 's/^SHA256(\(.*\))= *\(.*\)$/\2  \1/'
              fi >> "$GITHUB_WORKSPACE/chess-client-${{ matrix.os }}-sha256.txt"
              found=1
            fi
          done
          if [ "$found" = "0" ]; then
            echo "No artifacts found for checksum generation"
          else
            cat "$GITHUB_WORKSPACE/chess-client-${{ matrix.os }}-sha256.txt"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: checksum-client-${{ matrix.os }}
          path: ${{ github.workspace }}/chess-client-${{ matrix.os }}-sha256.txt
          retention-days: 1

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: chess-client/release/*
          fail_on_unmatched_files: false

  checksums:
    name: Bundle checksums
    runs-on: ubuntu-latest
    needs: [create-release, upload-docker, package]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: checksum-docker
          path: checksums

      - uses: actions/download-artifact@v4
        with:
          pattern: checksum-client-*
          path: checksums
          merge-multiple: true

      - name: Bundle checksums
        run: |
          ls -la checksums/
          tar czf checksums-all.tar.gz checksums/*-sha256.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: checksums-all.tar.gz
