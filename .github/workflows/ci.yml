name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check
      - run: pnpm lint

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql postgresql-client
          sudo pg_ctlcluster $(pg_lsclusters -h | awk '{print $1, $2}') start 2>/dev/null || true
          sudo -u postgres createuser -s chess 2>/dev/null || true
          sudo -u postgres createdb -O chess chess_test 2>/dev/null || true
          sudo -u postgres psql -c "ALTER USER chess WITH PASSWORD 'chess'"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Copy lockfile for Docker context
        run: cp ../pnpm-lock.yaml .

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: chess-api
          push: false
          tags: chess-api:ci

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chess-client-build
          path: chess-client/dist/
          retention-days: 3
