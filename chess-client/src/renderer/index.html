<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src *; img-src 'self' data:;">
  <title>Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0e0e10;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(79, 142, 247, 0.03) 0%, transparent 70%);
      color: #e0e0e0;
      -webkit-font-smoothing: antialiased;
    }
    #app { height: 100%; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes scaleIn { from { opacity:0;transform:scale(0.8) } to { opacity:1;transform:scale(1) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

    /* ─── Board Themes ─── */
    :root {
      --sq-light: #3d3d52;
      --sq-dark: #2c2c38;
    }
    [data-theme="classic"] {
      --sq-light: #f0d9b5;
      --sq-dark: #b58863;
    }
    [data-theme="blue"] {
      --sq-light: #dee3e6;
      --sq-dark: #8ca2ad;
    }
    [data-theme="green"] {
      --sq-light: #eeeed2;
      --sq-dark: #769656;
    }
    [data-theme="gray"] {
      --sq-light: #c8c8c8;
      --sq-dark: #6b6b6b;
    }
    [data-theme="amber"] {
      --sq-light: #f5deb3;
      --sq-dark: #b8860b;
    }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
