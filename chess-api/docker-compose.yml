services:
  chess-api:
    build: .
    image: chess-api
    ports:
      - "${PORT:-25565}:3000"
    restart: unless-stopped
    volumes:
      - chess-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chess-data:
