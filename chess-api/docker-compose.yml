services:
  # ─── Redis (enabled via --redis flag in start.sh) ─
  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - chess-pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chess}
      POSTGRES_DB: chess
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── pgAdmin ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chess.example}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # ─── Chess API ───────────────────────────────────
  chess-api:
    build: .
    image: chess-api
    ports:
      - "${PORT:-25565}:25565"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - /proc:/host/proc:ro
    environment:
      - REDIS_URL=${REDIS_URL:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DATABASE_URL=postgresql://chess:${POSTGRES_PASSWORD:-chess}@postgres:5432/chess
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env or production environment}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:25565/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Cloudflare Tunnel (optional, enabled via --profile tunnel) ─
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - chess-api
    command: tunnel --url http://chess-api:25565

volumes:
  chess-pg-data:
  pgadmin-data:
  redis-data:
