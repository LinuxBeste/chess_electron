services:
  # ─── Chess API (internal only) ──────────────────────────────
  chess-api:
    build: .
    image: chess-api
    expose:
      - "25565"
    restart: unless-stopped
    volumes:
      - chess-data:/app/data
      - ./logs:/app/logs
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:25565/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Cloudflare Tunnel (public HTTPS, no open inbound ports) ─
  # Provides a public URL so anyone can play.
  # Quick tunnel (default): run `docker compose logs cloudflared` to get URL.
  # Named tunnel: set TUNNEL_TOKEN env or mount credentials + use config.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - chess-api
    # ───── Quick tunnel: random URL, no setup needed ─────
    command: tunnel --url http://chess-api:25565
    # ───── Named tunnel (for permanent URL): ─────
    # Uncomment and configure on Cloudflare dashboard first:
    # command: tunnel --config /etc/cloudflared/config.yml run
    # volumes:
    #   - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    #   - cloudflared-cred:/home/nonroot/.cloudflared

volumes:
  chess-data:
  # cloudflared-cred:   # uncomment with named tunnel
