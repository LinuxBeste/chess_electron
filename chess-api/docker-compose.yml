services:
  # ─── Redis (enabled via --redis flag in start.sh) ─
  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - chess-pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chess}
      POSTGRES_DB: chess
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── pgAdmin ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chess.example}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # ─── Chess API ───────────────────────────────────
  chess-api:
    build: .
    image: chess-api
    ports:
      - "${PORT:-25565}:25565"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./load-test/dist:/app/load-test/dist:ro
      - ./load-test/README.md:/app/load-test/README.md:ro
      - /proc:/host/proc:ro
    env_file: .env
    environment:
      - UV_THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-32}
      - REDIS_URL=${REDIS_URL:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DATABASE_URL=postgresql://chess:${POSTGRES_PASSWORD:-chess}@postgres:5432/chess
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env or production environment}
      - DB_POOL_MAX=${DB_POOL_MAX:-100}
      - IP_RATE_LIMIT_MAX=${IP_RATE_LIMIT_MAX:-100000}
      - REG_RATE_LIMIT_MAX=${REG_RATE_LIMIT_MAX:-100000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100000}
      - WS_MAX_CONNECTIONS_PER_IP=${WS_MAX_CONNECTIONS_PER_IP:-1000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:25565/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Caddy reverse proxy ───────────────────────────
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    depends_on:
      - chess-api
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

  # ─── Cloudflare Tunnel (optional, enabled via --profile tunnel) ─
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - chess-api
    command: tunnel --url http://chess-api:25565

volumes:
  chess-pg-data:
  pgadmin-data:
  redis-data:
  caddy-data:
  caddy-config:
