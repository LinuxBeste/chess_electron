services:
  chess-api:
    build: .
    image: chess-api
    ports:
      - "${PORT:-25565}:3000"
    restart: unless-stopped
    volumes:
      - chess-data:/app/data
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Production TLS termination via Caddy (auto Let's Encrypt).
  # Uncomment and configure for HTTPS in production:
  #
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - caddy-data:/data
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #   depends_on:
  #     - chess-api
  #   restart: unless-stopped

volumes:
  chess-data:
  # caddy-data:   # uncomment with caddy
