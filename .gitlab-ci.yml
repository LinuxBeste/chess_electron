image: node:22

variables:
  PNPM_CACHE_FOLDER: .pnpm-store
  PNPM_VERSION: "11"

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .pnpm-store
    - node_modules/.pnpm

default:
  tags: [docker]
  before_script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm config set store-dir $PNPM_CACHE_FOLDER
    - pnpm install --frozen-lockfile

stages:
  - lint
  - typecheck
  - test
  - build
  - docker
  - package
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'master'
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'web'
    - if: $CI_PIPELINE_SOURCE == 'push'

lint:
  stage: lint
  script:
    - pnpm format:check
    - pnpm lint

api-typecheck:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm --filter chess-api typecheck

client-typecheck:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm --filter chess-client typecheck

admin-frontend:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm exec eslint chess-api/admin-frontend/src/
    - pnpm exec tsc --noEmit -p chess-api/admin-frontend/tsconfig.json
    - pnpm exec prettier --check chess-api/admin-frontend/src/

tests-ui-admin:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-api-admin test

api-test:
  stage: test
  needs: [lint]
  services:
    - name: postgres:17
      alias: postgres
  variables:
    POSTGRES_USER: chess
    POSTGRES_PASSWORD: chess
    POSTGRES_DB: chess_test
    TEST_DATABASE_URL: postgresql://chess:chess@postgres:5432/chess_test
  script:
    - pnpm --filter chess-api test:coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: chess-api/coverage/cobertura-coverage.xml
    paths:
      - chess-api/coverage/
    expire_in: 7 days

tests-client:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-client test:general
  artifacts:
    when: always
    paths:
      - chess-client/coverage/
    expire_in: 7 days

tests-ui:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-client test:ui
  artifacts:
    when: always
    paths:
      - chess-client/coverage/
    expire_in: 7 days

api-build:
  stage: build
  needs: [api-typecheck, api-test]
  script:
    - pnpm --filter chess-api build

client-build:
  stage: build
  needs: [client-typecheck, tests-client, tests-ui]
  script:
    - pnpm --filter chess-client build
  artifacts:
    paths:
      - chess-client/dist/
    expire_in: 3 days

website:
  stage: build
  needs: [lint]
  script:
    - pnpm --filter chess-website build
  artifacts:
    paths:
      - website/dist/
    expire_in: 3 days

docker:
  stage: docker
  needs: [api-build]
  image:
    name: docker:27
    entrypoint: [""]
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache nodejs
  script:
    - docker build -t chess-api:ci chess-api/

# ── Release jobs (only on tags) ──

docker-release:
  stage: docker
  needs: [api-build]
  image:
    name: docker:27
    entrypoint: [""]
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache nodejs
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG chess-api/
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:latest

client-package-linux:
  stage: package
  needs: [client-build]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pnpm --filter chess-client build
    - npx electron-builder --linux --publish=never
  artifacts:
    paths:
      - chess-client/release/
    expire_in: 30 days

client-package-macos:
  stage: package
  needs: [client-build]
  tags: [macos]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pnpm --filter chess-client build
    - npx electron-builder --mac --publish=never
  artifacts:
    paths:
      - chess-client/release/
    expire_in: 30 days

client-package-windows:
  stage: package
  needs: [client-build]
  tags: [windows]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pnpm --filter chess-client build
    - npx electron-builder --win --publish=never
  artifacts:
    paths:
      - chess-client/release/
    expire_in: 30 days

release:
  stage: release
  needs:
    - docker-release
    - client-package-linux
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release $CI_COMMIT_TAG..."
  release:
    name: $CI_COMMIT_TAG
    tag_name: $CI_COMMIT_TAG
    description: "Automated release $CI_COMMIT_TAG"
