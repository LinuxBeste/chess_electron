image: node:22

variables:
  PNPM_CACHE_FOLDER: .pnpm-store
  PNPM_VERSION: "11"

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .pnpm-store
    - node_modules/.pnpm

default:
  before_script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm config set store-dir $PNPM_CACHE_FOLDER
    - pnpm config set fetch-timeout 120000
    - pnpm config set network-concurrency 3
    - pnpm install --frozen-lockfile

stages:
  - lint
  - typecheck
  - test
  - build
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'master'
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'web'
    - if: $CI_PIPELINE_SOURCE == 'push'

lint:
  stage: lint
  script:
    - pnpm format:check
    - pnpm lint

api-typecheck:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm --filter chess-api typecheck

client-typecheck:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm --filter chess-client typecheck

admin-frontend:
  stage: typecheck
  needs: [lint]
  script:
    - pnpm exec eslint chess-api/admin-frontend/src/
    - pnpm exec tsc --noEmit -p chess-api/admin-frontend/tsconfig.json
    - pnpm exec prettier --check chess-api/admin-frontend/src/

tests-ui-admin:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-api-admin test

api-test:
  stage: test
  needs: [lint]
  services:
    - name: postgres:17
      alias: postgres
  variables:
    POSTGRES_USER: chess
    POSTGRES_PASSWORD: chess
    POSTGRES_DB: chess_test
    TEST_DATABASE_URL: postgresql://chess:chess@postgres:5432/chess_test
  script:
    - apt-get update -qq && apt-get install -y -qq postgresql-client >/dev/null
    - until pg_isready -h postgres -U chess; do sleep 1; done
    - pnpm --filter chess-api test:coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: chess-api/coverage/cobertura-coverage.xml
    paths:
      - chess-api/coverage/
    expire_in: 7 days

tests-client:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-client test:general
  artifacts:
    when: always
    paths:
      - chess-client/coverage/
    expire_in: 7 days

tests-ui:
  stage: test
  needs: [lint]
  script:
    - pnpm --filter chess-client test:ui
  artifacts:
    when: always
    paths:
      - chess-client/coverage/
    expire_in: 7 days

api-build:
  stage: build
  needs: [api-typecheck, api-test]
  script:
    - pnpm --filter chess-api build

client-build:
  stage: build
  needs: [client-typecheck, tests-client, tests-ui]
  script:
    - pnpm --filter chess-client build
  artifacts:
    paths:
      - chess-client/dist/
    expire_in: 3 days

website:
  stage: build
  needs: [lint]
  script:
    - pnpm --filter chess-website build
  artifacts:
    paths:
      - website/dist/
    expire_in: 3 days

docker:
  stage: build
  needs: [api-build]
  image: docker:27
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - ""
  script:
    - docker build -t chess-api:ci chess-api/

docker-release:
  stage: build
  needs: [api-build]
  image: docker:27
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - ""
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG chess-api/
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest

release:
  stage: release
  needs: [docker-release]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release $CI_COMMIT_TAG..."
  release:
    name: $CI_COMMIT_TAG
    tag_name: $CI_COMMIT_TAG
    description: "Automated release $CI_COMMIT_TAG"
